
name: Deploy FastAPI to SAP Cloud Foundry

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: python -m unittest discover copilot/ai/test

    - name: Deploy to SAP Cloud Foundry
      env:
        CF_API_URL: ${{ secrets.CF_API_URL }}
        CF_USER: ${{ secrets.CF_USER }}
        CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
        CF_ORG: ${{ secrets.CF_ORG }}
        CF_SPACE: ${{ secrets.CF_SPACE }}
      run: |
        npm install -g cf-cli
        cf login -a $CF_API_URL -u $CF_USER -p $CF_PASSWORD -o $CF_ORG -s $CF_SPACE
        cf push fastapi-sap-ai-app -f manifest.yml
